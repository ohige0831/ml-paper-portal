name: Daily OpenAlex Fetch

on:
  schedule:
    # [TRIAL B案 2026-04-22〜2026-04-29] fetch を1日3回に変更
    # 試験運用終了後は以下に戻すこと:
    #   - cron: '10 3 * * *'
    # スケジュール: 09:00 / 15:00 / 21:00 JST (= 00:00 / 06:00 / 12:00 UTC)
    # Worker cron (summarize) は 10分後: 00:10 / 06:10 / 12:10 UTC
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch from OpenAlex and ingest to Worker
        run: node scripts/fetch_openalex.js
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          OPENALEX_MAILTO: kagerou5100@gmail.com
