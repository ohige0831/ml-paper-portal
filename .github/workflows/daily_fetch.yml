name: Daily OpenAlex Fetch

on:
  schedule:
    # [Step 1: 2026-04-23〜] 1日1回 (09:00 JST = 00:00 UTC) に縮小
    # 変更前: 3回/日 (00:00/06:00/12:00 UTC), 50件/回
    # 変更後: 1回/日 (00:00 UTC), 20件/回
    # Worker cron (summarize) は 00:10 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch from OpenAlex and ingest to Worker
        run: node scripts/fetch_openalex.js
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          OPENALEX_MAILTO: kagerou5100@gmail.com
